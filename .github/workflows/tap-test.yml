name: tap-test

# Throwaway: verify `brew install proximile/tap/axel` works end to end.
on:
  workflow_dispatch:

jobs:
  brew-install:
    runs-on: macos-14
    steps:
      - name: brew install from the tap
        run: |
          set -x
          brew update
          brew install --build-from-source proximile/tap/axel
          which axel
          axel --version | head -1
          axel --help >/dev/null && echo "axel runs OK"
