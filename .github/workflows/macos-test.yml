name: macos-test

# Throwaway workflow to validate building a universal2 macOS binary entirely on
# an Apple Silicon runner (no dependency on scarce Intel runners). Removed once
# the recipe is verified.
on:
  workflow_dispatch:

jobs:
  macos-universal:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          brew install autoconf automake libtool pkg-config autoconf-archive \
            gettext txt2man openssl@3
      - name: Build universal2 binary on one runner
        run: |
          set -x
          G="$(brew --prefix gettext)"
          export PATH="$G/bin:$PATH"
          export ACLOCAL_PATH="$G/share/gettext/m4"
          ARM="$(brew --prefix openssl@3)"

          # Pull the x86_64 OpenSSL bottle (same formula version as the native
          # arm64 keg) and merge both into universal static libraries.
          brew fetch --force --bottle-tag=sonoma openssl@3
          CACHE="$(brew --cache --bottle-tag=sonoma openssl@3)"
          echo "x86_64 bottle: $CACHE"
          mkdir -p x86 && tar -xzf "$CACHE" -C x86
          X86="$(ls -d "$PWD"/x86/openssl@3/*/)"
          echo "x86_64 keg: $X86"
          file "$ARM/lib/libssl.a" "$X86/lib/libssl.a"

          mkdir -p uni/lib uni/include
          lipo -create "$ARM/lib/libssl.a"    "$X86/lib/libssl.a"    -output uni/lib/libssl.a
          lipo -create "$ARM/lib/libcrypto.a" "$X86/lib/libcrypto.a" -output uni/lib/libcrypto.a
          cp -R "$ARM/include/." uni/include/
          lipo -info uni/lib/libssl.a

          autoreconf -fiv
          ./configure --disable-Werror --disable-nls \
            CFLAGS="-O2 -arch arm64 -arch x86_64" \
            LDFLAGS="-arch arm64 -arch x86_64" \
            SSL_CFLAGS="-I$PWD/uni/include" \
            SSL_LIBS="$PWD/uni/lib/libssl.a $PWD/uni/lib/libcrypto.a"
          make -j3

          echo "=== result ==="
          file ./axel
          lipo -info ./axel
          otool -L ./axel
          ./axel --version | head -1
