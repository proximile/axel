name: macos-test

# Throwaway workflow to iterate on the macOS build recipe quickly (arm64 only,
# no emulation). Removed once the recipe is verified.
on:
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          brew install autoconf automake libtool pkg-config autoconf-archive \
            gettext txt2man openssl@3
      - name: Build
        run: |
          G="$(brew --prefix gettext)"
          echo "=== where is AM_GNU_GETTEXT_VERSION defined? ==="
          grep -l AM_GNU_GETTEXT_VERSION "$G"/share/gettext/m4/*.m4 2>/dev/null || true
          export PATH="$G/bin:$PATH"
          # gettext's m4 macros live under share/gettext/m4, not share/aclocal.
          export ACLOCAL_PATH="$G/share/gettext/m4"
          SSL="$(brew --prefix openssl@3)"
          autoreconf -fiv
          ./configure --disable-Werror --disable-nls CFLAGS="-O2" \
            SSL_CFLAGS="-I$SSL/include" \
            SSL_LIBS="$SSL/lib/libssl.a $SSL/lib/libcrypto.a"
          make -j3
          echo "=== result ==="
          file ./axel
          otool -L ./axel
          ./axel --version | head -1
