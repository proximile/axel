name: macos-test

# Throwaway workflow to iterate on the macOS build recipe quickly (arm64 only,
# no emulation). Removed once the recipe is verified.
on:
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          brew install autoconf automake libtool pkg-config autoconf-archive \
            gettext txt2man openssl@3
      - name: Diagnose gettext m4 layout
        run: |
          set -x
          G="$(brew --prefix gettext)"
          echo "gettext prefix: $G"
          ls -la "$G/share/aclocal" 2>&1 | head || echo "no $G/share/aclocal"
          find "$G" -name 'gettext.m4' 2>/dev/null || echo "no gettext.m4 under gettext prefix"
          find /opt/homebrew -name 'gettext.m4' 2>/dev/null | head
          which autopoint || echo "no autopoint on PATH"
          "$G/bin/autopoint" --version 2>&1 | head -1 || true
          aclocal --print-ac-dir 2>&1 || true
      - name: Build
        run: |
          export PATH="$(brew --prefix gettext)/bin:$PATH"
          export ACLOCAL_PATH="$(brew --prefix gettext)/share/aclocal"
          SSL="$(brew --prefix openssl@3)"
          autoreconf -fiv
          ./configure --disable-Werror --disable-nls CFLAGS="-O2" \
            SSL_CFLAGS="-I$SSL/include" \
            SSL_LIBS="$SSL/lib/libssl.a $SSL/lib/libcrypto.a"
          make -j3
          echo "=== result ==="
          file ./axel
          otool -L ./axel
          ./axel --version | head -1
