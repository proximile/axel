name: windows-test

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Force LF line endings (autotools breaks on CRLF)
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v4
      - uses: cygwin/cygwin-install-action@v4
        with:
          packages: >-
            gcc-core make autoconf automake libtool pkg-config gettext-devel
            libssl-devel openssl-devel autoconf-archive txt2man zip file
      - name: Build (verbose, set -e so failures surface)
        shell: C:\cygwin\bin\bash.exe --login -o igncr -eo pipefail '{0}'
        run: |
          cd "$(cygpath '${{ github.workspace }}')"
          autoreconf -fiv
          ./configure --disable-Werror --disable-nls CFLAGS="-O2"
          make -j2
          echo "=== where did the binary land? ==="
          find . -maxdepth 2 -name 'axel*.exe' -o -maxdepth 2 -name axel -type f | head
          echo "=== file + run ==="
          BIN="$(find . -maxdepth 2 -name 'axel.exe' | head -1)"
          file "$BIN"
          "$BIN" --version | head -1
          echo "=== runtime DLLs ==="
          cygcheck "$BIN" | tr -d '\r'
